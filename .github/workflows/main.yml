name: Auto Update Toffee Playlist

on:
  schedule:
    - cron: '*/30 * * * *'   # প্রতি 30 মিনিটে
  workflow_dispatch:          # ম্যানুয়ালি রান করার বাটন

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate M3U playlists
        run: python update_toffee.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toffee_OTT_Navigator.m3u toffee_NS_Player.m3u toffee_channel_data.json
          git diff --cached --quiet || (git commit -m "🔁 Auto update Toffee streams" && git push)
