name: Auto Update Playlist

on:
  schedule:
    - cron: '*/30 * * * *'      # প্রতি 30 মিনিটে রান হবে (তুমি ইচ্ছে করলে সময় বদলাতে পারো)
  workflow_dispatch:             # ম্যানুয়ালি রান করার বাটন

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - name: Generate playlist
        run: python generate.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update playlist"
          git push
